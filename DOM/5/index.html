<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div class="controls">
        <select id="font-family" title="Font Family">
        <option value="Arial">Arial</option>
        <option value="Verdana">Verdana</option>
        <option value="Times New Roman">Times New Roman</option>
    </select>
    <select id="font-size" title="Font Size">
        <option value="8">8</option>
        <option value="10">10</option>
        <option value="12">12</option>
        <option value="14">14</option>  
    </select>
    <button id="bold-btn" title="Bold"><b>B</b></button>
    <button id="italic-btn" title="Italic"><i>I</i></button>
    <button id="underline-btn" title="Underline"><u>U</u></button>
    </div>
    <textarea id="text-box" placeholder="Type something..." style="width: 300px; height: 300px;"></textarea>
    <script src="script.js"></script>
</body>
</html>

<!-- When typing any text inside the box, you should be able to edit it, such as changing the font type, making it bold, adding an underline, and adjusting the font size -->
