<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
    <form action="">
        <input id="name" type="text" placeholder="Name">
        <input id="age" type="text" placeholder="Age">
           <div class="radio">
        <label for="male">Male</label>
        <input type="radio" name="gender" value="male" checked>
        <br>
     
        <label for="female">Female</label>
        <input type="radio" placeholder="Gender" value="female" name="gender" >
        </div>

        <textarea name="area" id="area" style="width: 200px; height: 100px;"></textarea>
        <input id="major" type="text" placeholder="Your major and university ">
        
        <ul>
  <li>
    <input type="checkbox" id="lang1" name="lang" value="c++">
    <label for="lang1">c++</label>
  </li>
  <li>
    <input type="checkbox" id="lang2" name="lang" value="java" >
    <label for="lang2">Java</label>
  </li>
  <li>
    <input type="checkbox" id="lang3" name="lang" value="c#">
    <label for="lang3">c#</label>
  </li>
</ul>
<input id="btn" type="button" value="submit">
    </form>

   
    </div>

<div id="container"></div>
    <script src="script.js"></script>
</body>
</html>
