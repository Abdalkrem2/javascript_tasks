<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
    <h1>Register</h1>
    <form class="registration" action="">
        <input type="text" placeholder="name" id="name">
        <input type="text" placeholder="email" id="email">
        <input type="text" placeholder="password" id="password">
        <button type="submit" id="reg-btn">submit</button>
    </form>
    </div>
    <div class="container">
    <h1>Login</h1>
    <form class="login" action="">
        <input type="text" placeholder="email" id="loginemail">
        <input type="text" placeholder="password" id="loginpassword">
        <button type="button" id="login-btn" >submit</button>
    </form>
    </div>
    <script src="script.js"></script>
</body>
</html>
